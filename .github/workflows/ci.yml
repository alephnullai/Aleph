name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # OS coverage carries the real risk (Windows path/temp behavior,
    # macOS specifics), so all three OSes run the floor version 3.11. The
    # per-OS second Python version is redundant for this pure-Python code,
    # so a single 3.12 canary on ubuntu guards a version-specific
    # regression without paying 2x on every OS. 4 lanes total.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11"]
        include:
          - os: ubuntu-latest
            python: "3.12"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Test
        run: pytest tests/ -q
